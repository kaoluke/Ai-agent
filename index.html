<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>115 學測 AI 作文批改專業版 (支援 Google Drive)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --primary-color: #1a73e8; --accent-color: #34a853; --drive-color: #fbbc04; --bg-color: #f4f6f8; }
        body { font-family: '-apple-system', 'PingFang TC', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; margin-bottom: 20px; }
        h1 { text-align: center; color: var(--primary-color); margin-top: 0; font-size: 1.8rem; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #5f6368; font-size: 0.95rem; }
        input[type="text"], input[type="password"], textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa;
        }
        
        .setup-box { background: #f8f9fa; border: 1px solid #e8eaed; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        
        .file-input-wrapper { background: #fff; border: 2px dashed #dadce0; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .file-input-wrapper:hover { border-color: var(--primary-color); background: #e8f0fe; }
        #fileInput { display: none; }
        #fileLabel { font-size: 1rem; color: #444; word-break: break-all; }

        .divider { text-align: center; color: #999; font-size: 0.9em; margin: 15px 0; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #eee; margin: 0 10px; }

        .media-container { width: 100%; background: #eee; border-radius: 12px; overflow: hidden; aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center; position: relative; }
        video, #capturedImage { width: 100%; height: 100%; object-fit: contain; }
        #capturedImage { display: none; background: #000; }

        .btn-group { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        button { 
            flex: 1; min-width: 140px; padding: 14px; border: none; border-radius: 8px; cursor: pointer; 
            font-size: 1.05rem; font-weight: bold; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 5px;
        }
        .btn-blue { background: var(--primary-color); color: white; }
        .btn-green { background: var(--accent-color); color: white; }
        .btn-drive { background: white; color: #5f6368; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-drive:hover { background: #f8f9fa; }
        .btn-outline { background: transparent; border: 2px solid #dadce0; color: #5f6368; }
        button:disabled { background: #e8eaed; color: #9aa0a6; cursor: not-allowed; border: none; }

        #resultArea { display: none; border-top: 2px solid #eee; margin-top: 30px; padding-top: 20px; }
        .markdown-body { padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #eee; font-size: 15px; }
        .loading-spinner { display: none; text-align: center; padding: 20px; color: var(--primary-color); font-weight: bold; }

        @media (max-width: 768px) {
            .btn-group { flex-direction: column; gap: 10px; }
            button { width: 100%; }
            .header-actions { flex-direction: column; gap: 10px; align-items: stretch !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📝 115 學測 AI 批改助手</h1>
        
        <div class="setup-box">
            <div class="input-group">
                <label>1. Google AI API Key (Gemini 辨識用)</label>
                <input type="password" id="apiKey" placeholder="請貼上 Gemini API Key">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label>2. Google Client ID (雲端硬碟儲存用 - 選填)</label>
                <input type="text" id="clientId" placeholder="請貼上 Google OAuth Client ID (結尾為 apps.googleusercontent.com)">
                <small style="color: #666; display: block; margin-top: 5px;">※ 若不需要存入雲端硬碟，此欄位可留空。</small>
            </div>
        </div>

        <div class="input-group">
            <label>批改科目與題目要求</label>
            <select id="subjectType" onchange="updateDefaultTopic()">
                <option value="EN">英文作文</option>
                <option value="CH">國語文寫作</option>
            </select>
            <textarea id="customTopic" rows="3" style="margin-top:8px;" placeholder="請輸入具體的作文題目或批改要求..."></textarea>
        </div>

        <div class="file-input-wrapper" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 1.5rem; margin-bottom: 5px;">📁</div>
            <span id="fileLabel">點擊此處從相簿上傳照片</span>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="divider">或使用相機即時拍攝</div>

        <div class="media-container">
            <video id="video" autoplay playsinline style="display: none;"></video>
            <div id="placeholder" style="color: #999; font-size: 0.9rem;">影像預覽區</div>
            <img id="capturedImage" alt="已擷取的作文照片">
        </div>

        <div class="btn-group">
            <button id="startBtn" class="btn-blue">📷 開啟相機</button>
            <button id="captureBtn" class="btn-green" style="display:none;">📸 拍照</button>
            <button id="analyzeBtn" class="btn-green" style="display:none;">✨ 開始 AI 批改</button>
            <button id="retakeBtn" class="btn-outline" style="display:none;">🔄 重新選取/拍攝</button>
        </div>

        <div id="loading" class="loading-spinner">✨ AI 閱卷委員正在分析中，請稍候...</div>

        <div id="resultArea">
            <div class="header-actions" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="color: var(--primary-color); margin: 0;">批改報告</h2>
                <div style="display: flex; gap: 10px;">
                    <button id="saveDriveBtn" class="btn-drive">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" width="18" height="18" alt="Drive"> 
                        存至雲端硬碟
                    </button>
                    <button onclick="window.print()" class="btn-outline" style="padding: 10px 15px;">🖨️ PDF</button>
                </div>
            </div>
            <div id="formattedContent" class="markdown-body"></div>
        </div>
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run/@google/generative-ai"
  }
}
</script>

<script type="module">
import { GoogleGenerativeAI } from "@google/generative-ai";

let stream = null;
let currentBase64 = null;
let rawMarkdownResult = ""; // 用於儲存 AI 原始文字，以便上傳到 Drive
let tokenClient; 
let gDriveAccessToken = null;

const video = document.getElementById('video');
const capturedImage = document.getElementById('capturedImage');
const placeholder = document.getElementById('placeholder');
const fileInput = document.getElementById('fileInput');
const fileLabel = document.getElementById('fileLabel');
const startBtn = document.getElementById('startBtn');
const captureBtn = document.getElementById('captureBtn');
const analyzeBtn = document.getElementById('analyzeBtn');
const retakeBtn = document.getElementById('retakeBtn');
const saveDriveBtn = document.getElementById('saveDriveBtn');
const customTopic = document.getElementById('customTopic');

function updateDefaultTopic() {
    const type = document.getElementById('subjectType').value;
    if(type === 'EN') {
        customTopic.value = "【題目】看圖寫作：寵物在生活中的角色。\n【要求】依 115 學測標準：第一段描述圖片現象，第二段說明原因及影響，文長至少 120 字。";
    } else {
        customTopic.value = "【題目】隔在我們之間的種種。\n【要求】依 115 國寫標準：需包含隔閡原因、換位思考及回應，給予 A+ 至 C 評等。";
    }
}
updateDefaultTopic();
window.updateDefaultTopic = updateDefaultTopic;

function stopCamera() {
    if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
    video.style.display = 'none';
}

startBtn.onclick = async () => {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream; video.style.display = 'block'; placeholder.style.display = 'none';
        capturedImage.style.display = 'none'; startBtn.style.display = 'none'; captureBtn.style.display = 'block';
        analyzeBtn.style.display = 'none'; retakeBtn.style.display = 'none';
    } catch (err) { alert("無法啟動相機：" + err.message); }
};

captureBtn.onclick = () => {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    currentBase64 = canvas.toDataURL('image/jpeg');
    showPreview(currentBase64);
};

fileInput.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => { currentBase64 = event.target.result; fileLabel.innerText = file.name; showPreview(currentBase64); };
    reader.readAsDataURL(file);
};

function showPreview(base64) {
    stopCamera(); capturedImage.src = base64; capturedImage.style.display = 'block'; placeholder.style.display = 'none';
    startBtn.style.display = 'none'; captureBtn.style.display = 'none'; analyzeBtn.style.display = 'block'; retakeBtn.style.display = 'block';
}

retakeBtn.onclick = () => {
    stopCamera(); currentBase64 = null; fileInput.value = ""; fileLabel.innerText = "點擊此處從相簿上傳照片";
    capturedImage.style.display = 'none'; placeholder.style.display = 'block'; startBtn.style.display = 'flex';
    analyzeBtn.style.display = 'none'; retakeBtn.style.display = 'none'; document.getElementById('resultArea').style.display = 'none';
};

// --- AI 批改邏輯 ---
analyzeBtn.onclick = async () => {
    if (!currentBase64) return;
    const key = document.getElementById('apiKey').value;
    if (!key) return alert("請輸入 Google AI API Key！");

    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');
    const formattedContent = document.getElementById('formattedContent');

    loading.style.display = 'block'; resultArea.style.display = 'none';
    analyzeBtn.disabled = true; retakeBtn.disabled = true;

    try {
        const genAI = new GoogleGenerativeAI(key);
        const model = genAI.getGenerativeModel({ model: "gemini-3.5-flash" });
        const prompt = `你是一位專業的台灣學測閱卷委員。請辨識圖片中的手寫文字。\n${customTopic.value}\n請根據 115 學測評分原則進行批改，並使用 Markdown 格式輸出標題、列表與修改建議。`;
        
        const result = await model.generateContent([ prompt, { inlineData: { data: currentBase64.split(',')[1], mimeType: "image/jpeg" } } ]);
        rawMarkdownResult = await result.response.text(); // 儲存供 Drive 使用
        
        formattedContent.innerHTML = marked.parse(rawMarkdownResult);
        loading.style.display = 'none'; resultArea.style.display = 'block';
        setTimeout(() => resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    } catch (err) { alert("AI 批改發生錯誤：" + err.message); loading.style.display = 'none'; } 
    finally { analyzeBtn.disabled = false; retakeBtn.disabled = false; }
};

// --- Google Drive 儲存邏輯 ---
saveDriveBtn.onclick = () => {
    const clientId = document.getElementById('clientId').value.trim();
    if (!clientId) {
        alert("請先在上方設定區輸入您的 Google Client ID！\n(若不知如何取得，請參考 AI 提供的步驟說明)");
        return;
    }
    if (!rawMarkdownResult) return alert("沒有可儲存的批改結果。");

    saveDriveBtn.innerText = "授權與儲存中...";
    saveDriveBtn.disabled = true;

    // 初始化 Google Identity Services 授權客戶端
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
                gDriveAccessToken = tokenResponse.access_token;
                uploadToDrive(); // 取得 Token 後執行上傳
            } else {
                alert("登入或授權失敗。");
                resetDriveBtn();
            }
        },
        error_callback: (err) => {
            console.error("OAuth 錯誤", err);
            alert("授權發生錯誤，請檢查 Client ID 是否正確且網域已加入信任清單。");
            resetDriveBtn();
        }
    });

    // 如果已經有 Token，直接上傳；沒有則觸發登入彈窗
    if (gDriveAccessToken) {
        uploadToDrive();
    } else {
        tokenClient.requestAccessToken();
    }
};

async function uploadToDrive() {
    saveDriveBtn.innerText = "上傳檔案中...";
    const dateStr = new Date().toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).replace(/[\/\s:]/g, '');
    const subject = document.getElementById('subjectType').options[document.getElementById('subjectType').selectedIndex].text;
    const fileName = `[${subject}] 115學測批改紀錄_${dateStr}.md`; // 存成 Markdown 檔

    // 建立 Multipart 上傳格式
    const metadata = { name: fileName, mimeType: 'text/markdown' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', new Blob([rawMarkdownResult], { type: 'text/markdown' }));

    try {
        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: new Headers({ 'Authorization': 'Bearer ' + gDriveAccessToken }),
            body: form
        });
        
        if (response.ok) {
            alert(`✅ 成功！\n檔案已儲存至您的 Google 雲端硬碟\n檔名：${fileName}`);
        } else {
            const errData = await response.json();
            alert("上傳失敗: " + errData.error.message);
        }
    } catch (error) {
        alert("網路錯誤或上傳中斷：" + error.message);
    } finally {
        resetDriveBtn();
    }
}

function resetDriveBtn() {
    saveDriveBtn.innerHTML = '<img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" width="18" height="18" alt="Drive"> 存至雲端硬碟';
    saveDriveBtn.disabled = false;
}
</script>

</body>
</html>
